<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="rv-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#153743"/>
      <stop offset="100%" stop-color="#25566A"/>
    </linearGradient>
    <linearGradient id="rv-water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A8FB5"/>
      <stop offset="100%" stop-color="#0E2A33"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#rv-sky)"/>
  <!-- Sun -->
  <circle cx="850" cy="220" r="80" fill="#D8AF4A" opacity="0.8"/>
  <!-- Distant hills -->
  <path d="M0 400 C 200 350, 400 380, 600 340 C 800 310, 1000 360, 1200 330 L 1200 480 L 0 480 Z" fill="#0E2A33" opacity="0.85"/>
  <!-- Green banks -->
  <path d="M0 700 L 400 620 L 500 660 L 350 780 L 0 780 Z" fill="#5C9C57"/>
  <path d="M1200 700 L 800 620 L 700 660 L 850 780 L 1200 780 Z" fill="#5C9C57"/>
  <!-- River meander -->
  <path d="M400 480 C 550 550, 650 550, 800 480 C 900 620, 950 780, 800 900 C 700 1020, 500 1000, 400 900 C 300 780, 300 620, 400 480 Z" fill="url(#rv-water)"/>
  <!-- Ripples -->
  <g stroke="#F1E1B0" stroke-width="2" fill="none" opacity="0.35">
    <path d="M470 650 C 550 640, 650 660, 730 650"/>
    <path d="M450 780 C 550 770, 650 790, 750 780"/>
    <path d="M470 900 C 550 890, 650 910, 730 900"/>
  </g>
</svg>
