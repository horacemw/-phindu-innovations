    <path d="M30 -30 Q 50 -100, 30 -150 L 50 -150 Q 70 -80, 80 -60 Z"/>
    <circle cx="-40" cy="-160" r="30" opacity="0.65"/>
    <circle cx="40" cy="-160" r="30" opacity="0.65"/>
