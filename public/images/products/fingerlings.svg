      <path d="M80 200 c 12 -6, 28 -6, 38 -1 l 6 -2 l -2 4 l 2 4 l -6 -2 c -10 5, -26 5, -38 -1 c -3 -2, -3 -5, 0 -4 z" opacity="0.8"/>
