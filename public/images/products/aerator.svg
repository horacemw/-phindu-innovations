<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ar-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#153743"/>
      <stop offset="100%" stop-color="#25566A"/>
    </linearGradient>
    <linearGradient id="ar-water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A8FB5"/>
      <stop offset="100%" stop-color="#0E2A33"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#ar-bg)"/>
  <!-- Water -->
  <rect y="550" width="1200" height="350" fill="url(#ar-water)"/>
  <!-- Aerator body -->
  <g transform="translate(600 500)">
    <rect x="-100" y="-40" width="200" height="80" rx="8" fill="#B4863A"/>
    <rect x="-80" y="-30" width="160" height="60" rx="4" fill="#8F6B2E"/>
    <!-- Paddles -->
    <g transform="translate(-140 0)">
      <circle cx="0" cy="0" r="60" stroke="#F1E1B0" stroke-width="4" fill="none"/>
      <g stroke="#F1E1B0" stroke-width="8" opacity="0.9">
        <line x1="-42" y1="-42" x2="42" y2="42"/>
        <line x1="42" y1="-42" x2="-42" y2="42"/>
        <line x1="0" y1="-60" x2="0" y2="60"/>
        <line x1="-60" y1="0" x2="60" y2="0"/>
      </g>
    </g>
    <g transform="translate(140 0)">
      <circle cx="0" cy="0" r="60" stroke="#F1E1B0" stroke-width="4" fill="none"/>
      <g stroke="#F1E1B0" stroke-width="8" opacity="0.9">
        <line x1="-42" y1="-42" x2="42" y2="42"/>
        <line x1="42" y1="-42" x2="-42" y2="42"/>
        <line x1="0" y1="-60" x2="0" y2="60"/>
        <line x1="-60" y1="0" x2="60" y2="0"/>
      </g>
    </g>
  </g>
  <!-- Splash -->
  <g fill="#F1E1B0" opacity="0.6">
    <circle cx="380" cy="530" r="8"/><circle cx="420" cy="510" r="5"/><circle cx="460" cy="530" r="6"/>
    <circle cx="740" cy="530" r="8"/><circle cx="780" cy="510" r="5"/><circle cx="820" cy="530" r="6"/>
  </g>
</svg>
