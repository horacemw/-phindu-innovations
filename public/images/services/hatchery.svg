<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ht-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E2A33"/>
      <stop offset="100%" stop-color="#153743"/>
    </linearGradient>
    <linearGradient id="ht-water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ABDDA"/>
      <stop offset="100%" stop-color="#2A8FB5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#ht-bg)"/>
  <!-- 3 circular tanks -->
  <g stroke="#B4863A" stroke-width="4">
    <ellipse cx="250" cy="620" rx="180" ry="60" fill="#153743"/>
    <ellipse cx="250" cy="460" rx="180" ry="60" fill="url(#ht-water)"/>
    <path d="M70 460 L 70 620 M 430 460 L 430 620" fill="none"/>

    <ellipse cx="600" cy="620" rx="180" ry="60" fill="#153743"/>
    <ellipse cx="600" cy="460" rx="180" ry="60" fill="url(#ht-water)"/>
    <path d="M420 460 L 420 620 M 780 460 L 780 620" fill="none"/>

    <ellipse cx="950" cy="620" rx="180" ry="60" fill="#153743"/>
    <ellipse cx="950" cy="460" rx="180" ry="60" fill="url(#ht-water)"/>
    <path d="M770 460 L 770 620 M 1130 460 L 1130 620" fill="none"/>
  </g>
  <!-- Fry dots in tanks -->
  <g fill="#D8AF4A" opacity="0.9">
    <circle cx="180" cy="460" r="4"/><circle cx="240" cy="450" r="4"/><circle cx="320" cy="465" r="4"/>
    <circle cx="540" cy="460" r="4"/><circle cx="600" cy="450" r="4"/><circle cx="660" cy="465" r="4"/>
    <circle cx="890" cy="460" r="4"/><circle cx="950" cy="450" r="4"/><circle cx="1020" cy="465" r="4"/>
  </g>
  <!-- Overhead pipe -->
  <path d="M100 250 L 1100 250" stroke="#B4863A" stroke-width="10" opacity="0.7"/>
  <g stroke="#B4863A" stroke-width="5" opacity="0.7">
    <line x1="250" y1="250" x2="250" y2="420"/>
    <line x1="600" y1="250" x2="600" y2="420"/>
    <line x1="950" y1="250" x2="950" y2="420"/>
  </g>
</svg>
