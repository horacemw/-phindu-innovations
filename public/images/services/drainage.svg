<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="dr-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#153743"/>
      <stop offset="100%" stop-color="#25566A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#dr-bg)"/>
  <!-- Drainage channels forming a Y -->
  <g stroke="#B4863A" stroke-width="18" fill="none" opacity="0.85">
    <path d="M100 200 L 500 500 L 500 800"/>
    <path d="M1100 200 L 500 500"/>
  </g>
  <g stroke="#2A8FB5" stroke-width="8" fill="none" opacity="0.7">
    <path d="M100 200 L 500 500 L 500 800"/>
    <path d="M1100 200 L 500 500"/>
  </g>
  <!-- Water flow indicators -->
  <g fill="#D8AF4A" opacity="0.6">
    <circle cx="250" cy="313" r="6"/>
    <circle cx="400" cy="425" r="6"/>
    <circle cx="500" cy="600" r="6"/>
    <circle cx="500" cy="700" r="6"/>
    <circle cx="900" cy="325" r="6"/>
