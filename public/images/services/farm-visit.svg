      <stop offset="0%" stop-color="#F1E1B0"/>
      <stop offset="70%" stop-color="#D8AF4A"/>
      <stop offset="100%" stop-color="#8F6B2E"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#fv-sky)"/>
  <!-- Sun low horizon -->
  <circle cx="900" cy="480" r="120" fill="#F1E1B0" opacity="0.9"/>
  <!-- Distant hills -->
  <path d="M0 540 C 200 500, 400 520, 600 490 C 800 470, 1000 510, 1200 480 L 1200 620 L 0 620 Z" fill="#582919"/>
  <path d="M0 610 C 300 570, 600 600, 900 580 C 1050 570, 1200 600, 1200 590 L 1200 720 L 0 720 Z" fill="#33170E"/>
