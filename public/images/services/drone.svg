<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="dn-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#25566A"/>
      <stop offset="100%" stop-color="#0E2A33"/>
    </linearGradient>
    <radialGradient id="dn-glow" cx="60%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#D8AF4A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D8AF4A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#dn-bg)"/>
  <rect width="1200" height="900" fill="url(#dn-glow)"/>
  <!-- 6-pond aerial pattern -->
  <g fill="#2A8FB5" fill-opacity="0.55" stroke="#B4863A" stroke-width="3">
    <rect x="140" y="220" width="290" height="180" rx="8"/>
    <rect x="460" y="220" width="290" height="180" rx="8"/>
    <rect x="780" y="220" width="290" height="180" rx="8"/>
    <rect x="140" y="440" width="290" height="180" rx="8"/>
    <rect x="460" y="440" width="290" height="180" rx="8"/>
    <rect x="780" y="440" width="290" height="180" rx="8"/>
  </g>
  <!-- Path -->
  <g stroke="#B4863A" stroke-width="6" fill="none" opacity="0.7">
    <line x1="60" y1="330" x2="1140" y2="330"/>
    <line x1="60" y1="550" x2="1140" y2="550"/>
  </g>
  <!-- Drone -->
  <g transform="translate(600 730)">
    <circle cx="0" cy="0" r="60" fill="#B4863A" opacity="0.15"/>
    <circle cx="0" cy="0" r="14" fill="#0E2A33" stroke="#D8AF4A" stroke-width="3"/>
    <g stroke="#D8AF4A" stroke-width="3">
      <line x1="-14" y1="-6" x2="-50" y2="-30"/>
      <line x1="14" y1="-6" x2="50" y2="-30"/>
      <line x1="-14" y1="6" x2="-50" y2="30"/>
      <line x1="14" y1="6" x2="50" y2="30"/>
    </g>
    <circle cx="-52" cy="-32" r="8" fill="#0E2A33" stroke="#D8AF4A" stroke-width="2"/>
    <circle cx="52" cy="-32" r="8" fill="#0E2A33" stroke="#D8AF4A" stroke-width="2"/>
    <circle cx="-52" cy="32" r="8" fill="#0E2A33" stroke="#D8AF4A" stroke-width="2"/>
    <circle cx="52" cy="32" r="8" fill="#0E2A33" stroke="#D8AF4A" stroke-width="2"/>
  </g>
</svg>
