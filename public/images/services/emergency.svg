      <stop offset="0%" stop-color="#33170E"/>
      <stop offset="100%" stop-color="#7D3B24"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#em-bg)"/>
  <!-- Circular pulse rings -->
