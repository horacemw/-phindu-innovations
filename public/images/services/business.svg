      <stop offset="0%" stop-color="#F1E1B0"/>
      <stop offset="100%" stop-color="#B4863A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bz-bg)"/>
  <!-- Chart lines -->
  <g stroke="#0E2A33" stroke-width="4" fill="none" opacity="0.9">
    <path d="M120 700 L 300 620 L 500 660 L 700 500 L 900 540 L 1080 380"/>
