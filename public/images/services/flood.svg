<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="fl-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E2A33"/>
      <stop offset="100%" stop-color="#25566A"/>
    </linearGradient>
    <linearGradient id="fl-river" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A8FB5"/>
      <stop offset="100%" stop-color="#1A5B71"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#fl-sky)"/>
  <!-- Distant hills -->
  <path d="M0 480 C 200 430, 400 450, 600 420 C 800 390, 1000 440, 1200 410 L 1200 550 L 0 550 Z" fill="#153743"/>
  <path d="M0 540 C 300 500, 600 530, 900 510 C 1050 500, 1200 520, 1200 510 L 1200 620 L 0 620 Z" fill="#0E2A33" opacity="0.8"/>
  <!-- River -->
