  <g fill="#8F6B2E">
    <circle cx="120" cy="670" r="3"/><circle cx="180" cy="665" r="3"/><circle cx="240" cy="675" r="3"/>
    <circle cx="480" cy="655" r="3"/><circle cx="560" cy="660" r="3"/><circle cx="640" cy="650" r="3"/>
    <circle cx="820" cy="645" r="3"/><circle cx="900" cy="660" r="3"/><circle cx="980" cy="655" r="3"/>
  </g>
</svg>
