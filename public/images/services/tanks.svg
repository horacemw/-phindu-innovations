<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="tk-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#153743"/>
      <stop offset="100%" stop-color="#0E2A33"/>
    </linearGradient>
    <linearGradient id="tk-side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F1E1B0"/>
      <stop offset="100%" stop-color="#8F6B2E"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#tk-bg)"/>
  <!-- Rectangular tanks in perspective -->
  <g>
    <path d="M120 380 L 500 340 L 500 720 L 120 760 Z" fill="url(#tk-side)" stroke="#582919" stroke-width="4"/>
    <path d="M500 340 L 880 380 L 880 760 L 500 720 Z" fill="url(#tk-side)" stroke="#582919" stroke-width="4" opacity="0.85"/>
    <path d="M120 380 L 500 340 L 880 380" fill="none" stroke="#582919" stroke-width="4"/>
    <!-- Water surfaces -->
    <path d="M140 420 L 480 380 L 480 500 L 140 540 Z" fill="#2A8FB5" opacity="0.85"/>
    <path d="M520 380 L 860 420 L 860 540 L 520 500 Z" fill="#2A8FB5" opacity="0.85"/>
  </g>
  <!-- Waterlines -->
  <g stroke="#D8AF4A" stroke-width="2" opacity="0.55" fill="none">
    <path d="M170 470 C 240 450, 370 460, 460 445"/>
    <path d="M540 445 C 620 450, 750 460, 830 470"/>
  </g>
  <!-- Overhead pipe -->
  <path d="M100 250 L 900 250" stroke="#B4863A" stroke-width="10" opacity="0.7"/>
  <g stroke="#B4863A" stroke-width="5" opacity="0.7">
    <line x1="310" y1="250" x2="310" y2="370"/>
    <line x1="690" y1="250" x2="690" y2="370"/>
  </g>
</svg>
